<head>

<title>Protected &middot; Lilac Hills Farm</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 1.5rem;
    background: linear-gradient(135deg, #5b3a8e 0%, #8e3a5b 100%);
    color: #fff;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 18px;
    padding: 2rem 2.25rem;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  }
  h1 { margin: 0 0 .35rem; font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; }
  p.sub { margin: 0 0 1.5rem; opacity: 0.78; font-size: 0.95rem; }
  label { display: block; font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.4rem; letter-spacing: 0.04em; text-transform: uppercase; }
  input[type=password] {
    width: 100%;
    padding: 0.8rem 1rem;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  input[type=password]:focus { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.15); }
  input[type=password]::placeholder { color: rgba(255,255,255,0.5); }
  button {
    margin-top: 0.9rem;
    width: 100%;
    padding: 0.85rem;
    border-radius: 10px;
    border: 0;
    background: #fff;
    color: #2a1a3a;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: transform .05s, background .15s;
  }
  button:hover:not(:disabled) { background: #f3eeff; }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.7; cursor: progress; }
  .err { margin-top: 0.85rem; color: #ffc4c4; font-size: 0.875rem; min-height: 1.2rem; }
  .foot { margin-top: 1.25rem; font-size: 0.75rem; opacity: 0.55; text-align: center; }
</style>
</head>

const f = document.getElementById('f');
const p = document.getElementById('p');
const e = document.getElementById('e');
const b = document.getElementById('b');

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function decrypt(password) {
  const enc = new TextEncoder();
  const salt = b64ToBytes(PAYLOAD.s);
  const iv = b64ToBytes(PAYLOAD.i);
  const ct = b64ToBytes(PAYLOAD.c);
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: PAYLOAD.it, hash: 'SHA-256' },
    km,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
  return new TextDecoder().decode(pt);
}

f.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  e.textContent = '';
  b.disabled = true;
  b.textContent = 'Unlocking…';
  try {
    const html = await decrypt(p.value);
    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    e.textContent = 'Wrong password. Try again.';
    b.disabled = false;
    b.textContent = 'Unlock';
    p.select();
  }
});

window.addEventListener('load', () => p.focus());
